# 本地开发：仅数据库（PostgreSQL）
# 使用：在项目根目录执行 docker compose up -d
# 默认映射到主机 5433（避免与本机已安装的 Postgres 冲突）；后端 .env 的 DATABASE_URL 端口要一致

services:
  postgres:
    image: postgres:16-alpine
    container_name: sports-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sports}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sports_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sports_analytics}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sports} -d ${POSTGRES_DB:-sports_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
